name: Build GNOME Remix
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore: ["**/README.md"]
  schedule:
    - cron: "05 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      desktop: gnome
      image_name: ubuntu-bootc-remix
      image_desc: "Unofficial Atomic Ubuntu (GNOME)"
    secrets:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}